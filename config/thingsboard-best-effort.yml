# ==============================================================================
# PERFIL: Best-Effort
# ==============================================================================
# Otimizado para: RTT ~100ms (50ms latency network simulation)
# CLIENT_SIDE_RPC_TIMEOUT: 500ms → RTT + processing + margin (tolerant)
# Target: Maximizar delivery ratio (latência não é crítica)
# ==============================================================================

# === RPC CONFIGURATION (MUITO RELAXADA) ===
CLIENT_SIDE_RPC_TIMEOUT: 500

# === HTTP OPTIMIZATION (CONSERVADORA) ===
HTTP_REQUEST_TIMEOUT_MS: 3000
HTTP_MAX_CONNECTIONS: 200
HTTP_MAX_CONNECTIONS_PER_ROUTE: 50
HTTP_CONNECTION_TIMEOUT_MS: 1000
HTTP_SOCKET_TIMEOUT_MS: 2000

# === BATCH PROCESSING (BATCH GRANDE, DELAY RELAXADO) ===
SQL_TS_BATCH_SIZE: 800
SQL_TS_BATCH_MAX_DELAY_MS: 25
SQL_TS_LATEST_BATCH_SIZE: 400
SQL_TS_LATEST_BATCH_MAX_DELAY_MS: 12
SQL_TS_BATCH_THREADS: 2
SQL_TS_LATEST_BATCH_THREADS: 2

# === QUEUE OPTIMIZATION (CONSERVADORA) ===
TB_QUEUE_CORE_POLL_INTERVAL_MS: 20
TB_QUEUE_CORE_PARTITIONS: 4
TB_QUEUE_CORE_WORKERS: 8
TB_QUEUE_RULE_ENGINE_THREAD_POOL_SIZE: 16
TB_QUEUE_TRANSPORT_THREAD_POOL_SIZE: 16
TB_QUEUE_JS_THREAD_POOL_SIZE: 8

# === JVM OPTIMIZATION (GC PAUSE MUITO RELAXADO) ===
# GC pause até 100ms é aceitável para Best-Effort
# Usa menos memória (4-6GB) já que não precisa ser tão agressivo
JAVA_OPTS: "-Xms4g -Xmx6g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:G1HeapRegionSize=16m -XX:+UseStringDeduplication -server"

# === ACTOR SYSTEM (CONSERVADOR) ===
ACTORS_SYSTEM_THROUGHPUT: 3
ACTORS_SYSTEM_DEVICE_DISPATCHER_POOL_SIZE: 2
ACTORS_SYSTEM_RULE_DISPATCHER_POOL_SIZE: 4
ACTORS_RULE_DB_CALLBACK_THREAD_POOL_SIZE: 12

# === DATABASE CONNECTION POOL (MENOR) ===
SPRING_DATASOURCE_MAXIMUM_POOL_SIZE: 12

# === MQTT OPTIMIZATION (MUITO RELAXADO) ===
MQTT_TIMEOUT_MS: 10000
NETTY_WORKER_GROUP_THREADS: 6

# === PROFILE METADATA ===
PROFILE_NAME: "Best-Effort Network Profile"
PROFILE_DESCRIPTION: "Optimized for RTT ~100ms, RPC timeout 1000ms (10× buffer)"
NETWORK_RTT_MS: 100
TIMEOUT_BUFFER_MULTIPLIER: 10
TARGET_LATENCY_MS: 1000
