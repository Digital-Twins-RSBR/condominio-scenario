# ==============================================================================
# PERFIL: eMBB (Enhanced Mobile Broadband)
# ==============================================================================
# Otimizado para: RTT ~50ms (25ms latency network simulation)
# CLIENT_SIDE_RPC_TIMEOUT: 300ms → RTT + processing + margin (2× URLLC)
# Target: Maximizar delivery ratio mantendo latência aceitável
# ==============================================================================

# === RPC CONFIGURATION (RELAXADA PARA eMBB) ===
CLIENT_SIDE_RPC_TIMEOUT: 300

# === HTTP OPTIMIZATION (BALANCEADA) ===
HTTP_REQUEST_TIMEOUT_MS: 1500
HTTP_MAX_CONNECTIONS: 250
HTTP_MAX_CONNECTIONS_PER_ROUTE: 60
HTTP_CONNECTION_TIMEOUT_MS: 750
HTTP_SOCKET_TIMEOUT_MS: 1500

# === BATCH PROCESSING (MENOS AGRESSIVO) ===
SQL_TS_BATCH_SIZE: 1000
SQL_TS_BATCH_MAX_DELAY_MS: 15
SQL_TS_LATEST_BATCH_SIZE: 500
SQL_TS_LATEST_BATCH_MAX_DELAY_MS: 8
SQL_TS_BATCH_THREADS: 3
SQL_TS_LATEST_BATCH_THREADS: 3

# === QUEUE OPTIMIZATION (MODERADA) ===
TB_QUEUE_CORE_POLL_INTERVAL_MS: 15
TB_QUEUE_CORE_PARTITIONS: 6
TB_QUEUE_CORE_WORKERS: 12
TB_QUEUE_RULE_ENGINE_THREAD_POOL_SIZE: 24
TB_QUEUE_TRANSPORT_THREAD_POOL_SIZE: 24
TB_QUEUE_JS_THREAD_POOL_SIZE: 12

# === JVM OPTIMIZATION (GC PAUSE RELAXADO) ===
# GC pause até 50ms é aceitável para eMBB (target latency ~200-300ms)
JAVA_OPTS: "-Xms6g -Xmx8g -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -XX:G1HeapRegionSize=16m -XX:+UseStringDeduplication -XX:G1NewSizePercent=40 -XX:G1MaxNewSizePercent=60 -server"

# === ACTOR SYSTEM (MODERADO) ===
ACTORS_SYSTEM_THROUGHPUT: 5
ACTORS_SYSTEM_DEVICE_DISPATCHER_POOL_SIZE: 4
ACTORS_SYSTEM_RULE_DISPATCHER_POOL_SIZE: 8
ACTORS_RULE_DB_CALLBACK_THREAD_POOL_SIZE: 20

# === DATABASE CONNECTION POOL ===
SPRING_DATASOURCE_MAXIMUM_POOL_SIZE: 16

# === MQTT OPTIMIZATION (RELAXADO) ===
MQTT_TIMEOUT_MS: 7000
NETTY_WORKER_GROUP_THREADS: 8

# === PROFILE METADATA ===
PROFILE_NAME: "eMBB Network Profile"
PROFILE_DESCRIPTION: "Optimized for RTT ~50ms, RPC timeout 500ms (10× buffer)"
NETWORK_RTT_MS: 50
TIMEOUT_BUFFER_MULTIPLIER: 10
TARGET_LATENCY_MS: 300
