# ==============================================================================
# PERFIL: URLLC M2S PERFORMANCE
# ==============================================================================
# Objetivo: reduzir latencia M2S sem invalidar comparabilidade dos cenarios base
# Uso: cenario 7 (m2s-perf) para validar ganho em M2S < 200ms
# ==============================================================================

# === RPC CONFIGURATION (M2S-FOCUSED) ===
CLIENT_SIDE_RPC_TIMEOUT: 220

# === HTTP OPTIMIZATION ===
HTTP_REQUEST_TIMEOUT_MS: 500
HTTP_MAX_CONNECTIONS: 300
HTTP_MAX_CONNECTIONS_PER_ROUTE: 80
HTTP_CONNECTION_TIMEOUT_MS: 300
HTTP_SOCKET_TIMEOUT_MS: 500

# === BATCH PROCESSING (LOW TAIL) ===
SQL_TS_BATCH_SIZE: 1600
SQL_TS_BATCH_MAX_DELAY_MS: 3
SQL_TS_LATEST_BATCH_SIZE: 800
SQL_TS_LATEST_BATCH_MAX_DELAY_MS: 1
SQL_TS_BATCH_THREADS: 5
SQL_TS_LATEST_BATCH_THREADS: 5

# === QUEUE OPTIMIZATION (M2S PATH) ===
TB_QUEUE_CORE_POLL_INTERVAL_MS: 5
TB_QUEUE_CORE_PARTITIONS: 10
TB_QUEUE_CORE_WORKERS: 24
TB_QUEUE_RULE_ENGINE_THREAD_POOL_SIZE: 48
TB_QUEUE_TRANSPORT_THREAD_POOL_SIZE: 48
TB_QUEUE_JS_THREAD_POOL_SIZE: 24

# === JVM OPTIMIZATION ===
JAVA_OPTS: "-Xms8g -Xmx10g -XX:+UseG1GC -XX:MaxGCPauseMillis=10 -XX:G1HeapRegionSize=16m -XX:+UseStringDeduplication -XX:G1NewSizePercent=40 -XX:G1MaxNewSizePercent=60 -server"

# === ACTOR SYSTEM ===
ACTORS_SYSTEM_THROUGHPUT: 8
ACTORS_SYSTEM_DEVICE_DISPATCHER_POOL_SIZE: 8
ACTORS_SYSTEM_RULE_DISPATCHER_POOL_SIZE: 10
ACTORS_RULE_DB_CALLBACK_THREAD_POOL_SIZE: 32

# === DATABASE CONNECTION POOL ===
SPRING_DATASOURCE_MAXIMUM_POOL_SIZE: 20

# === MQTT OPTIMIZATION ===
MQTT_TIMEOUT_MS: 5000
NETTY_WORKER_GROUP_THREADS: 12

# === PERFIL INFO ===
PROFILE_NAME: "URLLC M2S Performance"
PROFILE_DESCRIPTION: "Scenario 7: lower M2S tail with middleware fast mode and reduced hot-path overhead"
HEARTBEAT_INTERVAL: 3
