# PostgreSQL Configuration for URLLC Testbed
# Optimized for high-concurrency WebSocket connections and throughput

# CONNECTION AND AUTHENTICATION
# Increase max_connections to support 600+ WebSocket connections from Thingsboard
max_connections = 500                        # increased from default 100
superuser_reserved_connections = 10

# RESOURCE USAGE
shared_buffers = 256MB                       # 25% of typical container memory
effective_cache_size = 1GB                   # 100% of available cache for large containers
maintenance_work_mem = 64MB                  # for autovacuum and ANALYZE
work_mem = 4MB                               # per operation memory (will be multiplied by max_connections)

# WRITE-AHEAD LOG (WAL)
wal_buffers = 16MB                           # higher value = fewer disk syncs = better throughput
min_wal_size = 2GB                           # WAL checkpoint spacing
max_wal_size = 8GB                           # max accumulated WAL before forced checkpoint

# CHECKPOINT TUNING
checkpoint_completion_target = 0.9           # spread I/O over 90% of checkpoint interval
checkpoint_timeout = 15min

# QUERY PLANNING
random_page_cost = 1.1                       # modern SSD assumed in containerized env
effective_io_concurrency = 200               # helps planner with parallel seq scans

# STATISTICS
default_statistics_target = 100              # better query planning for medium-sized tables
autovacuum = on
autovacuum_naptime = 30s                     # check every 30s (from default 60s)
autovacuum_vacuum_scale_factor = 0.02        # VACUUM 2% of table (from 0.2)
autovacuum_analyze_scale_factor = 0.01       # ANALYZE 1% of table (from 0.1)

# LOGGING (optional, for debugging)
# log_connections = on
# log_disconnections = on
# log_min_duration_statement = 1000           # log queries taking >1s

# PERFORMANCE: disable synchronous_commit for better throughput (acceptable loss risk in testbed)
# WARNING: only for dev/test, not production
synchronous_commit = off                     # improves insert/update throughput 20-30%

# PARALLEL QUERY EXECUTION
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_worker_processes = 4
